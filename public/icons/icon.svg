<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B3A5C"/>
      <stop offset="100%" stop-color="#0F2640"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4A43A"/>
      <stop offset="100%" stop-color="#C8952E"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Subtle inner glow -->
  <rect x="8" y="8" width="496" height="496" rx="100" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>

  <!-- Stylized "S" letter with flow lines -->
  <!-- Main S shape -->
  <path d="M 310 148
           C 310 148, 310 128, 280 114
           C 250 100, 200 100, 170 114
           C 140 128, 128 152, 128 176
           C 128 210, 155 232, 190 244
           L 322 292
           C 357 304, 384 326, 384 360
           C 384 384, 372 408, 342 422
           C 312 436, 262 436, 232 422
           C 202 408, 202 388, 202 388"
        fill="none" stroke="white" stroke-width="44" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Flow accent line (parallel to S, offset) -->
  <path d="M 290 172
           C 290 172, 282 158, 262 150
           C 238 140, 212 142, 194 152
           C 176 162, 168 178, 168 194
           C 168 216, 184 230, 208 240
           L 304 272
           C 328 282, 344 298, 344 322
           C 344 340, 334 356, 318 366
           C 298 378, 272 380, 252 374
           C 236 368, 228 356, 228 356"
        fill="none" stroke="url(#accent)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

  <!-- Small diamond accent dots suggesting data flow -->
  <circle cx="340" cy="136" r="10" fill="url(#accent)" opacity="0.7"/>
  <circle cx="172" cy="400" r="10" fill="url(#accent)" opacity="0.7"/>
</svg>
